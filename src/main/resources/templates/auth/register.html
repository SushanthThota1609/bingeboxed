<!-- src/main/resources/templates/auth/register.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BingeBoxed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .register-container { max-width: 400px; margin-top: 80px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 register-container">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Create Account</h3>
                </div>
                <div class="card-body">
                    <div id="message" class="alert d-none"></div>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" required>
                            <div class="invalid-feedback">Valid email required</div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" minlength="8" required>
                            <div class="form-text">Minimum 8 characters</div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Register</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">Already have an account? <a href="/login">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (response.status === 201) {
                messageDiv.className = 'alert alert-success';
                messageDiv.textContent = 'Registration successful! Redirecting to login...';
                messageDiv.classList.remove('d-none');
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } else if (response.status === 409) {
                messageDiv.className = 'alert alert-danger';
                messageDiv.textContent = data.message || 'Email already exists';
                messageDiv.classList.remove('d-none');
            } else {
                messageDiv.className = 'alert alert-danger';
                messageDiv.textContent = data.message || 'Validation error';
                messageDiv.classList.remove('d-none');
            }
        } catch (error) {
            messageDiv.className = 'alert alert-danger';
            messageDiv.textContent = 'An error occurred. Please try again.';
            messageDiv.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
