<!-- src/main/resources/templates/auth/login.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — BingeBoxed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #e8452c;
            --accent-glow: rgba(232, 69, 44, 0.25);
            --text: #f0ede8;
            --muted: #6b6880;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Cinematic background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(ellipse 80% 60% at 10% 80%, rgba(232,69,44,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 50% at 90% 10%, rgba(100,60,200,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Scanline texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255,255,255,0.012) 2px,
                    rgba(255,255,255,0.012) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        .card-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.6rem;
            letter-spacing: 0.06em;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.2rem;
        }

        .brand span {
            color: var(--accent);
        }

        .tagline {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.2rem 2rem;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-card h2 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 1.8rem;
        }

        label {
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            padding: 0.72rem 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1.2rem;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder { color: #3a3a50; }

        .btn-primary-custom {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            padding: 0.78rem;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s, box-shadow 0.2s;
            margin-top: 0.4rem;
        }

        .btn-primary-custom:hover {
            opacity: 0.9;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-primary-custom:active { transform: scale(0.98); }

        .btn-primary-custom:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .alert-box {
            border-radius: 8px;
            font-size: 0.85rem;
            padding: 0.7rem 0.9rem;
            margin-bottom: 1.2rem;
            display: none;
        }

        .alert-box.show { display: block; animation: fadeIn 0.2s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background: rgba(40, 180, 100, 0.12);
            border: 1px solid rgba(40, 180, 100, 0.3);
            color: #5de89a;
        }

        .alert-error {
            background: rgba(232, 69, 44, 0.1);
            border: 1px solid rgba(232, 69, 44, 0.3);
            color: #f08070;
        }

        .footer-link {
            margin-top: 1.6rem;
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card-wrap">
    <div class="brand">Binge<span>Boxed</span></div>
    <div class="tagline">Your watchlist. Your world.</div>

    <div class="auth-card">
        <h2>Welcome back</h2>

        <div id="alertBox" class="alert-box" role="alert"></div>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>

        <button class="btn-primary-custom" id="submitBtn" onclick="handleLogin()">
            Sign In
        </button>

        <div class="footer-link">
            New here? <a href="/register">Create an account</a>
        </div>
    </div>
</div>

<script>
    async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');

        alertBox.className = 'alert-box';
        alertBox.textContent = '';

        if (!email || !password) {
            showAlert('error', 'Please fill in all fields.');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok) {
                showAlert('success', 'Signed in! Redirecting…');
                localStorage.setItem('token', data.token);
                setTimeout(() => window.location.href = '/', 1200);
            } else {
                showAlert('error', data.error || 'Invalid credentials.');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        } catch {
            showAlert('error', 'Network error. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    function showAlert(type, message) {
        const box = document.getElementById('alertBox');
        box.className = `alert-box alert-${type} show`;
        box.textContent = message;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
