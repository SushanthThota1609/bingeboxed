<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Social - BingeBoxed</title>
</head>
<body>
<th:block th:fragment="section">
    <div class="container py-4">
        <h1 class="mb-4">Social Hub</h1>

        <!-- User Search Section -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Find Friends</h5>
            </div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by username or email...">
                    <button id="searchBtn" class="btn btn-primary">Search</button>
                </div>
                <div id="searchResults"></div>
            </div>
        </div>

        <!-- Incoming Requests -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Friend Requests Received</h5>
            </div>
            <div class="card-body" id="incomingRequestsContainer">
                <p class="text-muted">Loading...</p>
            </div>
        </div>

        <!-- Friends List -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">My Friends</h5>
            </div>
            <div class="card-body" id="friendsContainer">
                <p class="text-muted">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('bb_token') || localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login';
        }

        function getAuthHeaders() {
            const currentToken = localStorage.getItem('bb_token') || localStorage.getItem('token');
            return {
                'Authorization': 'Bearer ' + currentToken,
                'Content-Type': 'application/json'
            };
        }

        async function fetchJson(url, options = {}) {
            options.headers = getAuthHeaders();
            try {
                const response = await fetch(url, options);
                
                if (response.status === 401) {
                    localStorage.removeItem('bb_token');
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return null;
                }
                
                if (!response.ok) {
                    const error = await response.text();
                    console.error('API Error:', error);
                    return null;
                }
                
                return response.status === 204 ? null : await response.json();
            } catch (error) {
                console.error('Fetch error:', error);
                return null;
            }
        }

        async function loadIncomingRequests() {
            const container = document.getElementById('incomingRequestsContainer');
            container.innerHTML = '<p class="text-muted">Loading...</p>';
            
            const requests = await fetchJson('/api/friends/requests/incoming');
            
            if (!requests || requests.length === 0) {
                container.innerHTML = '<p class="text-muted">No incoming friend requests.</p>';
                return;
            }
            
            let html = '<div class="list-group">';
            requests.forEach(req => {
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${escapeHtml(req.senderDisplayName || 'User')}</strong>
                            <br>
                            <small class="text-muted">Sent: ${new Date(req.createdAt).toLocaleDateString()}</small>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-success me-2" onclick="acceptRequest(${req.id})">Accept</button>
                            <button class="btn btn-sm btn-danger" onclick="declineRequest(${req.id})">Decline</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function loadFriends() {
            const container = document.getElementById('friendsContainer');
            container.innerHTML = '<p class="text-muted">Loading...</p>';
            
            const friends = await fetchJson('/api/friends');
            
            if (!friends || friends.length === 0) {
                container.innerHTML = '<p class="text-muted">You have no friends yet. Search for users to add!</p>';
                return;
            }
            
            let html = '<div class="row">';
            friends.forEach(friend => {
                html += `
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${escapeHtml(friend.displayName || friend.username || 'User')}</h5>
                                <p class="card-text text-muted small">${escapeHtml(friend.username || '')}</p>
                                <p class="card-text"><small>Friends since: ${new Date(friend.friendSince).toLocaleDateString()}</small></p>
                                <div class="d-flex gap-2">
                                    <button onclick="viewProfile(${friend.id})" class="btn btn-outline-primary btn-sm">View Profile</button>
                                    <button onclick="viewWatchlist(${friend.id})" class="btn btn-outline-secondary btn-sm">Watchlist</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function searchUsers() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Please enter a search term');
                return;
            }
            
            const container = document.getElementById('searchResults');
            container.innerHTML = '<div class="text-center"><div class="spinner-border spinner-border-sm"></div> Searching...</div>';
            
            const users = await fetchJson(`/api/users/search?query=${encodeURIComponent(query)}`);
            
            if (!users || users.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No users found</div>';
                return;
            }
            
            let html = '<div class="list-group">';
            users.forEach(user => {
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${escapeHtml(user.displayName || user.username || user.email)}</strong>
                            <br>
                            <small class="text-muted">${escapeHtml(user.email || '')}</small>
                            ${user.isFriend ? '<span class="badge bg-success ms-2">Friend</span>' : ''}
                            ${user.requestSent ? '<span class="badge bg-warning ms-2">Request Sent</span>' : ''}
                        </div>
                        ${!user.isFriend && !user.requestSent ? `
                            <button class="btn btn-sm btn-primary" onclick="sendFriendRequest(${user.id})">Add Friend</button>
                        ` : ''}
                        ${user.isFriend ? `
                            <button class="btn btn-sm btn-outline-primary" onclick="viewProfile(${user.id})">View Profile</button>
                        ` : ''}
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function sendFriendRequest(receiverId) {
            try {
                const response = await fetch('/api/friends/requests', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ receiverId: receiverId })
                });
                
                if (response.status === 201 || response.status === 200) {
                    alert('Friend request sent!');
                    searchUsers(); // Refresh search results
                } else if (response.status === 409) {
                    alert('Friend request already sent or user is already your friend');
                } else {
                    const error = await response.text();
                    alert('Failed to send request: ' + error);
                }
            } catch (error) {
                console.error('Error sending request:', error);
                alert('Network error. Please try again.');
            }
        }

        async function acceptRequest(requestId) {
            const response = await fetch(`/api/friends/requests/${requestId}/accept`, {
                method: 'POST',
                headers: getAuthHeaders()
            });
            
            if (response.ok) {
                alert('Friend request accepted!');
                loadIncomingRequests();
                loadFriends();
            } else {
                alert('Failed to accept request');
            }
        }

        async function declineRequest(requestId) {
            const response = await fetch(`/api/friends/requests/${requestId}/decline`, {
                method: 'POST',
                headers: getAuthHeaders()
            });
            
            if (response.ok) {
                alert('Friend request declined');
                loadIncomingRequests();
            } else {
                alert('Failed to decline request');
            }
        }

        function viewProfile(userId) {
            window.location.href = `/users/${userId}/profile`;
        }

        function viewWatchlist(userId) {
            window.location.href = `/watchlist/user/${userId}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', searchUsers);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchUsers();
        });

        // Load data
        loadIncomingRequests();
        loadFriends();
    </script>
</th:block>
</body>
</html>
