<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('For You - BingeBoxed')}"></head>
<body>

<div th:replace="~{layout/base :: nav('recommendations')}"></div>

<style>
    .rec-container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .rec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .rec-title { font-family: "Bebas Neue", sans-serif; font-size: 2rem; letter-spacing: 0.05em; color: var(--text-main); }
    .btn-generate {
        background: var(--amber);
        color: #0a0c12;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        transition: opacity 0.15s;
    }
    .btn-generate:hover { opacity: 0.85; }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
    .rec-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 1.5rem;
    }
    .rec-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.15s, border-color 0.15s;
    }
    .rec-card:hover { transform: translateY(-3px); border-color: var(--purple); }
    .rec-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1a1f2e; }
    .rec-poster-placeholder {
        width: 100%; aspect-ratio: 2/3;
        background: #1a1f2e;
        display: flex; align-items: center; justify-content: center;
        color: var(--text-muted); font-size: 0.8rem;
    }
    .rec-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.4rem; flex: 1; }
    .rec-card-title { font-weight: 600; font-size: 0.95rem; color: var(--text-main); line-height: 1.3; }
    .rec-meta { font-size: 0.78rem; color: var(--text-muted); }
    .rec-score-bar-bg { background: var(--border); border-radius: 4px; height: 6px; margin-top: 0.3rem; }
    .rec-score-bar { background: var(--amber); border-radius: 4px; height: 6px; }
    .rec-score-label { font-size: 0.78rem; color: var(--amber); font-weight: 600; margin-top: 0.2rem; }
    .rec-reason { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-top: 0.25rem; flex: 1; }
    .rec-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .btn-watchlist-add {
        flex: 1;
        background: var(--amber);
        border: none;
        border-radius: 6px;
        color: #0a0c12;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.35rem 0.6rem;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        transition: opacity 0.15s;
        white-space: nowrap;
    }
    .btn-watchlist-add:hover { opacity: 0.85; }
    .btn-watchlist-add:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-watchlist-add.added {
        background: transparent;
        border: 1px solid #4ade80;
        color: #4ade80;
        cursor: default;
    }
    .btn-dismiss {
        background: transparent;
        border: 1px solid #e05252;
        color: #e05252;
        border-radius: 6px;
        padding: 0.35rem 0.6rem;
        font-size: 0.8rem;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
    }
    .btn-dismiss:hover { background: #e05252; color: #fff; }
    .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem 1rem;
        color: var(--text-muted);
    }
    .empty-state p { font-size: 1rem; margin-bottom: 0.5rem; }
    .loading-overlay {
        grid-column: 1 / -1;
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
    }
    .spinner {
        width: 36px; height: 36px;
        border: 3px solid var(--border);
        border-top-color: var(--amber);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert-error {
        background: rgba(224, 82, 82, 0.12);
        border: 1px solid #e05252;
        color: #e05252;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 1.5rem;
        display: none;
        font-size: 0.9rem;
    }
    .alert-success {
        background: rgba(74, 222, 128, 0.12);
        border: 1px solid #4ade80;
        color: #4ade80;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 1.5rem;
        display: none;
        font-size: 0.9rem;
    }
</style>

<div class="rec-container">
    <div class="rec-header">
        <div class="rec-title">For You</div>
        <button class="btn-generate" id="generateBtn">Generate Recommendations</button>
    </div>
    <div class="alert-error" id="errorBanner"></div>
    <div class="alert-success" id="successBanner"></div>
    <div class="rec-grid" id="recGrid">
        <div class="loading-overlay" id="initialLoader">
            <div class="spinner"></div>
            <p>Loading your recommendations&#8230;</p>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>

<script>
(function () {
    const TOKEN_KEY = "bb_token";

    function getToken() {
        return localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY);
    }

    function authHeaders() {
        return { "Authorization": "Bearer " + getToken(), "Content-Type": "application/json" };
    }

    function showError(msg) {
        const el = document.getElementById("errorBanner");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(function () { el.style.display = "none"; }, 5000);
    }

    function showSuccess(msg) {
        const el = document.getElementById("successBanner");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(function () { el.style.display = "none"; }, 3000);
    }

    function scorePercent(score) {
        return Math.min(100, Math.round((parseFloat(score) / 100) * 100));
    }

    function buildCard(rec) {
        const card = document.createElement("div");
        card.className = "rec-card";
        card.dataset.tmdbId = rec.tmdbId;

        const pct = scorePercent(rec.score);
        const typeLabel = rec.contentType === "SERIES" ? "Series" : "Movie";
        const yearLabel = rec.releaseYear ? " \u00b7 " + rec.releaseYear : "";
        const genreLabel = rec.genre ? " \u00b7 " + rec.genre : "";

        if (rec.posterUrl) {
            const img = document.createElement("img");
            img.className = "rec-poster";
            img.src = rec.posterUrl;
            img.alt = rec.title || "Poster";
            card.appendChild(img);
        } else {
            const ph = document.createElement("div");
            ph.className = "rec-poster-placeholder";
            ph.textContent = "No Image";
            card.appendChild(ph);
        }

        const body = document.createElement("div");
        body.className = "rec-body";

        const title = document.createElement("div");
        title.className = "rec-card-title";
        title.textContent = rec.title || "Unknown Title";

        const meta = document.createElement("div");
        meta.className = "rec-meta";
        meta.textContent = typeLabel + yearLabel + genreLabel;

        const barBg = document.createElement("div");
        barBg.className = "rec-score-bar-bg";
        const bar = document.createElement("div");
        bar.className = "rec-score-bar";
        bar.style.width = pct + "%";
        barBg.appendChild(bar);

        const scoreLabel = document.createElement("div");
        scoreLabel.className = "rec-score-label";
        scoreLabel.textContent = pct + "% match";

        const reason = document.createElement("div");
        reason.className = "rec-reason";
        reason.textContent = rec.reason || "";

        const actions = document.createElement("div");
        actions.className = "rec-actions";

        const addBtn = document.createElement("button");
        addBtn.className = "btn-watchlist-add";
        addBtn.textContent = "+ Watchlist";
        addBtn.addEventListener("click", function () {
            addToWatchlist(rec, addBtn);
        });

        const dismissBtn = document.createElement("button");
        dismissBtn.className = "btn-dismiss";
        dismissBtn.textContent = "Dismiss";
        dismissBtn.addEventListener("click", function () {
            dismissCard(rec.tmdbId, card);
        });

        actions.appendChild(addBtn);
        actions.appendChild(dismissBtn);

        body.appendChild(title);
        body.appendChild(meta);
        body.appendChild(barBg);
        body.appendChild(scoreLabel);
        body.appendChild(reason);
        body.appendChild(actions);
        card.appendChild(body);

        return card;
    }

    async function addToWatchlist(rec, btn) {
        const token = getToken();
        if (!token) { window.location.href = "/login"; return; }

        btn.disabled = true;
        btn.textContent = "Adding...";

        try {
            const res = await fetch("/api/watchlist", {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({
                    tmdbId: rec.tmdbId,
                    contentType: rec.contentType,
                    status: "WANT_TO_WATCH"
                })
            });

            if (res.status === 401) { window.location.href = "/login"; return; }

            if (res.status === 409) {
                btn.textContent = "In Watchlist";
                btn.classList.add("added");
                return;
            }

            if (res.ok) {
                btn.textContent = "Added!";
                btn.classList.add("added");
                showSuccess((rec.title || "Title") + " added to your watchlist.");
            } else {
                btn.disabled = false;
                btn.textContent = "+ Watchlist";
                showError("Could not add to watchlist.");
            }
        } catch (e) {
            btn.disabled = false;
            btn.textContent = "+ Watchlist";
            showError("Network error adding to watchlist.");
        }
    }

    function renderGrid(recs) {
        const grid = document.getElementById("recGrid");
        grid.innerHTML = "";
        if (!recs || recs.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty-state";
            const p1 = document.createElement("p");
            p1.textContent = "No recommendations yet.";
            const p2 = document.createElement("p");
            p2.textContent = "Hit Generate Recommendations to get started.";
            empty.appendChild(p1);
            empty.appendChild(p2);
            grid.appendChild(empty);
            return;
        }
        recs.forEach(function (rec) { grid.appendChild(buildCard(rec)); });
    }

    async function loadRecommendations() {
        const token = getToken();
        if (!token) { window.location.href = "/login"; return; }

        try {
            const res = await fetch("/api/recommendations", { headers: authHeaders() });
            if (res.status === 401) { window.location.href = "/login"; return; }
            if (!res.ok) { showError("Failed to load recommendations."); renderGrid([]); return; }
            renderGrid(await res.json());
        } catch (e) {
            showError("Network error loading recommendations.");
            renderGrid([]);
        }
    }

    async function dismissCard(tmdbId, cardEl) {
        const token = getToken();
        if (!token) { window.location.href = "/login"; return; }

        try {
            const res = await fetch("/api/recommendations/" + tmdbId, {
                method: "DELETE",
                headers: authHeaders()
            });
            if (res.status === 401) { window.location.href = "/login"; return; }
            if (res.status === 204 || res.ok) {
                cardEl.remove();
                if (document.getElementById("recGrid").children.length === 0) renderGrid([]);
            } else {
                showError("Could not dismiss recommendation.");
            }
        } catch (e) {
            showError("Network error dismissing recommendation.");
        }
    }

    document.getElementById("generateBtn").addEventListener("click", async function () {
        const token = getToken();
        if (!token) { window.location.href = "/login"; return; }

        const btn = document.getElementById("generateBtn");
        const grid = document.getElementById("recGrid");

        btn.disabled = true;
        btn.textContent = "Generating\u2026";

        const overlay = document.createElement("div");
        overlay.className = "loading-overlay";
        const spinner = document.createElement("div");
        spinner.className = "spinner";
        const p = document.createElement("p");
        p.textContent = "Generating your picks\u2026";
        overlay.appendChild(spinner);
        overlay.appendChild(p);
        grid.innerHTML = "";
        grid.appendChild(overlay);

        try {
            const res = await fetch("/api/recommendations/generate", {
                method: "POST",
                headers: authHeaders()
            });
            if (res.status === 401) { window.location.href = "/login"; return; }
            if (!res.ok) {
                const err = await res.json().catch(function () { return {}; });
                showError(err.message || "Failed to generate recommendations.");
                await loadRecommendations();
                return;
            }
            renderGrid(await res.json());
        } catch (e) {
            showError("Network error generating recommendations.");
            await loadRecommendations();
        } finally {
            btn.disabled = false;
            btn.textContent = "Generate Recommendations";
        }
    });

    loadRecommendations();
})();
</script>

</body>
</html>
