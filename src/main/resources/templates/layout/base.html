<!-- src/main/resources/templates/layout/base.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">BingeBoxed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --bg-deep:    #0a0c12;
            --bg-card:    #11141e;
            --amber:      #f5a623;
            --text-main:  #e8eaf0;
            --text-muted: #6b7280;
            --border:     #252b3b;
            --purple:     #6c63ff;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }
        .bb-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .bb-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            color: var(--text-main);
            text-decoration: none;
        }
        .bb-brand span { color: var(--amber); }
        .bb-nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .bb-nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.15s;
        }
        .bb-nav-links a:hover  { color: var(--amber); }
        .bb-nav-links a.active { color: var(--amber); }
        .btn-logout {
            background: transparent;
            border: 1px solid #e05252;
            color: #e05252;
            border-radius: 6px;
            padding: 0.35rem 0.85rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s, color 0.15s;
        }
        .btn-logout:hover { background: #e05252; color: #fff; }
    </style>
</head>

<div th:fragment="nav(activePage)">
    <nav class="bb-nav">
        <a href="/catalog" class="bb-brand">Binge<span>Boxed</span></a>
        <div class="bb-nav-links">
            <a href="/catalog"   th:classappend="${activePage == 'catalog'}   ? 'active' : ''">Browse</a>
            <a href="/watchlist" th:classappend="${activePage == 'watchlist'} ? 'active' : ''">My Watchlist</a>
            <a href="/profile"   th:classappend="${activePage == 'profile'}   ? 'active' : ''">Profile</a>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </nav>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqvfGMM/Sq7wjPT5f71hx5j6lX"
            crossorigin="anonymous"></script>
    <script>
        (function () {
            const token = localStorage.getItem('bb_token') || sessionStorage.getItem('bb_token');
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                    }).finally(() => {
                        localStorage.removeItem('bb_token');
                        sessionStorage.removeItem('bb_token');
                        window.location.href = '/login';
                    });
                });
            }
        })();
    </script>
</div>
</html>
