<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, section)" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="${title}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/catalog">BingeBoxed</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/catalog">Browse</a>
                </li>
                <li class="nav-item d-none" id="watchlistNavItem">
                    <a class="nav-link" href="/watchlist">My Watchlist</a>
                </li>
                <li class="nav-item d-none" id="reviewsNavItem">
                    <a class="nav-link" href="/reviews">Reviews</a>
                </li>
                <li class="nav-item d-none" id="socialNavItem">
                    <a class="nav-link" href="/social">Social</a>
                </li>
                <li class="nav-item d-none" id="recommendationsNavItem">
                    <a class="nav-link" href="/recommendations">For You</a>
                </li>
            </ul>
            <ul class="navbar-nav" id="authNav">
                <li class="nav-item" id="loginNavItem">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item" id="registerNavItem">
                    <a class="nav-link" href="/register">Register</a>
                </li>
                <li class="nav-item d-none" id="profileNavItem">
                    <a class="nav-link" href="/profile">Profile</a>
                </li>
                <li class="nav-item d-none" id="logoutNavItem">
                    <a class="nav-link" href="#" id="navLogoutBtn">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <th:block th:replace="${section}"/>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        function getToken() {
            return localStorage.getItem('bb_token') || localStorage.getItem('token');
        }
        
        function setToken(token) {
            localStorage.setItem('bb_token', token);
            localStorage.setItem('token', token);
        }
        
        const token = getToken();
        
        console.log('Base layout - Token exists:', !!token);
        
        if (token) {
            const loginNav = document.getElementById('loginNavItem');
            const registerNav = document.getElementById('registerNavItem');
            const profileNav = document.getElementById('profileNavItem');
            const logoutNav = document.getElementById('logoutNavItem');
            const watchlistNav = document.getElementById('watchlistNavItem');
            const reviewsNav = document.getElementById('reviewsNavItem');
            const socialNav = document.getElementById('socialNavItem');
            const recommendationsNav = document.getElementById('recommendationsNavItem');
            
            if (loginNav) loginNav.classList.add('d-none');
            if (registerNav) registerNav.classList.add('d-none');
            if (profileNav) profileNav.classList.remove('d-none');
            if (logoutNav) logoutNav.classList.remove('d-none');
            if (watchlistNav) watchlistNav.classList.remove('d-none');
            if (reviewsNav) reviewsNav.classList.remove('d-none');
            if (socialNav) socialNav.classList.remove('d-none');
            if (recommendationsNav) recommendationsNav.classList.remove('d-none');
        }
        
        const logoutBtn = document.getElementById('navLogoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function (e) {
                e.preventDefault();
                const t = getToken();
                fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + t }
                }).finally(function () {
                    localStorage.removeItem('bb_token');
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                });
            });
        }
    })();
</script>
</body>
</html>
