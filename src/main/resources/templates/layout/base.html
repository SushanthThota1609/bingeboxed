<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, section)" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="${title}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/catalog">BingeBoxed</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/catalog">Browse</a>
                </li>
                <li class="nav-item d-none" id="watchlistNavItem">
                    <a class="nav-link" href="/watchlist">Watchlist</a>
                </li>
            </ul>
            <ul class="navbar-nav" id="authNav">
                <li class="nav-item" id="loginNavItem">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item" id="registerNavItem">
                    <a class="nav-link" href="/register">Register</a>
                </li>
                <li class="nav-item d-none" id="profileNavItem">
                    <a class="nav-link" href="/profile">Profile</a>
                </li>
                <li class="nav-item d-none" id="logoutNavItem">
                    <a class="nav-link" href="#" id="navLogoutBtn">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <th:block th:replace="${section}"/>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        const token = localStorage.getItem('bb_token');
        if (token) {
            document.getElementById('loginNavItem').classList.add('d-none');
            document.getElementById('registerNavItem').classList.add('d-none');
            document.getElementById('profileNavItem').classList.remove('d-none');
            document.getElementById('logoutNavItem').classList.remove('d-none');
            document.getElementById('watchlistNavItem').classList.remove('d-none');
        }
        document.getElementById('navLogoutBtn').addEventListener('click', function (e) {
            e.preventDefault();
            fetch('/api/auth/logout', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('bb_token') }
            }).finally(function () {
                localStorage.removeItem('bb_token');
                window.location.href = '/login';
            });
        });
    })();
</script>
</body>
</html>
