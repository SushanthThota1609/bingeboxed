<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - BingeBoxed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/catalog">BingeBoxed</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/catalog">Browse</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navLogoutBtn">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">Edit Profile</h3>
                    <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
                </div>
                <div class="card-body">
                    <form id="profileForm">
                        <div class="mb-3">
                            <label for="displayName" class="form-label">Display Name</label>
                            <input type="text" class="form-control" id="displayName" name="displayName">
                        </div>
                        <div class="mb-3">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea class="form-control" id="bio" name="bio" rows="4"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="avatarUrl" class="form-label">Avatar URL</label>
                            <input type="url" class="form-control" id="avatarUrl" name="avatarUrl">
                            <img id="avatarPreview" class="avatar-preview" alt="Avatar preview">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="/profile" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                        <div id="message" class="mt-3"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Read token from the key used by the auth system (bb_token)
    let token = localStorage.getItem('bb_token');
    if (!token) token = sessionStorage.getItem('bb_token');

    // Also check for other possible keys used by login page
    if (!token) token = localStorage.getItem('token');
    if (!token) token = sessionStorage.getItem('token');

    console.log('Token found for edit page:', token ? 'yes (length: ' + token.length + ')' : 'no');

    if (!token) {
        console.warn('No authentication token found, redirecting to login');
        window.location.href = '/login';
    }

    // Load current profile data
    fetch('/api/profiles/me', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
        .then(response => {
            console.log('Profile load response status:', response.status);
            if (response.status === 401) {
                localStorage.removeItem('bb_token');
                sessionStorage.removeItem('bb_token');
                localStorage.removeItem('token');
                sessionStorage.removeItem('token');
                window.location.href = '/login';
                return Promise.reject('Unauthorized');
            }
            if (!response.ok) {
                return response.json().then(err => Promise.reject(err));
            }
            return response.json();
        })
        .then(profile => {
            document.getElementById('displayName').value = profile.displayName || '';
            document.getElementById('bio').value = profile.bio || '';
            document.getElementById('avatarUrl').value = profile.avatarUrl || '';
            updateAvatarPreview(profile.avatarUrl);
        })
        .catch(error => {
            console.error('Error loading profile:', error);
            showMessage('Failed to load profile data.', 'danger');
        });

    // Avatar preview on URL change
    const avatarUrlInput = document.getElementById('avatarUrl');
    avatarUrlInput.addEventListener('input', function() {
        updateAvatarPreview(this.value);
    });

    function updateAvatarPreview(url) {
        const preview = document.getElementById('avatarPreview');
        if (url && url.trim() !== '') {
            preview.src = url;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    }

    // Form submission
    const form = document.getElementById('profileForm');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            displayName: document.getElementById('displayName').value,
            bio: document.getElementById('bio').value,
            avatarUrl: document.getElementById('avatarUrl').value
        };

        fetch('/api/profiles/me', {
            method: 'PUT',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
            .then(response => {
                console.log('Profile update response status:', response.status);
                if (response.status === 401) {
                    localStorage.removeItem('bb_token');
                    sessionStorage.removeItem('bb_token');
                    localStorage.removeItem('token');
                    sessionStorage.removeItem('token');
                    window.location.href = '/login';
                    return Promise.reject('Unauthorized');
                }
                if (!response.ok) {
                    return response.json().then(err => Promise.reject(err));
                }
                return response.json();
            })
            .then(updated => {
                showMessage('Profile updated successfully!', 'success');
                setTimeout(() => {
                    window.location.href = '/profile';
                }, 1500);
            })
            .catch(error => {
                console.error('Update error:', error);
                const msg = error.error || error.message || 'Failed to update profile.';
                showMessage(msg, 'danger');
            });
    });

    function showMessage(msg, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${escapeHtml(msg)}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>`;
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function clearTokens() {
        localStorage.removeItem('bb_token');
        sessionStorage.removeItem('bb_token');
        localStorage.removeItem('token');
        sessionStorage.removeItem('token');
    }

    function doLogout() {
        fetch('/api/auth/logout', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
        }).finally(function() {
            clearTokens();
            window.location.href = '/login';
        });
    }

    document.getElementById('logoutBtn').addEventListener('click', doLogout);
    document.getElementById('navLogoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        doLogout();
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
