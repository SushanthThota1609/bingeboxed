<!-- src/main/resources/templates/profiles/edit.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile – BingeBoxed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:    #0a0c12;
            --bg-card:    #11141e;
            --bg-input:   #12122a;
            --amber:      #f5a623;
            --text-main:  #e8eaf0;
            --text-muted: #6b7280;
            --border:     #252b3b;
            --purple:     #6c63ff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .bb-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .bb-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            color: var(--text-main);
            text-decoration: none;
        }

        .bb-brand span { color: var(--amber); }

        .bb-nav-links { display: flex; gap: 1.5rem; align-items: center; }

        .bb-nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.15s;
        }

        .bb-nav-links a:hover { color: var(--amber); }
        .bb-nav-links a.active { color: var(--amber); }

        .btn-logout {
            background: transparent;
            border: 1px solid #e05252;
            color: #e05252;
            border-radius: 6px;
            padding: 0.35rem 0.85rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s, color 0.15s;
        }

        .btn-logout:hover { background: #e05252; color: #fff; }

        .card { background-color: var(--bg-card); border: 1px solid var(--border); }

        .form-control, .form-control:focus {
            background-color: var(--bg-input);
            color: var(--text-main);
            border-color: var(--border);
            font-family: 'DM Sans', sans-serif;
        }

        .form-control:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 0.2rem rgba(108,99,255,.25);
        }

        .btn-primary { background-color: var(--purple); border-color: var(--purple); }
        .btn-primary:hover { background-color: #574fd6; border-color: #574fd6; }

        .btn-outline-secondary {
            border-color: var(--border);
            color: var(--text-muted);
        }

        .btn-outline-secondary:hover {
            background: var(--bg-input);
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        label { color: var(--text-muted); }

        #statusMsg { display: none; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="bb-nav">
    <a href="/catalog" class="bb-brand">Binge<span>Boxed</span></a>
    <div class="bb-nav-links">
        <a href="/catalog">Browse</a>
        <a href="/profile" class="active">Profile</a>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg rounded-4 p-4">

                <h2 class="mb-4" style="color: var(--purple);">Edit Profile</h2>

                <div id="statusMsg" class="alert" role="alert"></div>

                <div class="mb-3">
                    <label for="displayName" class="form-label">Display Name</label>
                    <input type="text" class="form-control" id="displayName"
                           maxlength="100" placeholder="Your display name">
                </div>

                <div class="mb-3">
                    <label for="bio" class="form-label">Bio</label>
                    <textarea class="form-control" id="bio" rows="4"
                              placeholder="Tell the world about your taste in shows…"></textarea>
                </div>

                <div class="mb-4">
                    <label for="avatarUrl" class="form-label">Avatar URL</label>
                    <input type="url" class="form-control" id="avatarUrl"
                           maxlength="500" placeholder="https://example.com/avatar.png">
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary" id="saveBtn">Save Changes</button>
                    <a href="/profile" class="btn btn-outline-secondary">Cancel</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('bb_token') || sessionStorage.getItem('bb_token');
    if (!token) { window.location.href = '/login'; }

    fetch('/api/profiles/me', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
        .then(r => {
            if (r.status === 401) { window.location.href = '/login'; return null; }
            return r.json();
        })
        .then(data => {
            if (!data) return;
            if (data.displayName) document.getElementById('displayName').value = data.displayName;
            if (data.bio)         document.getElementById('bio').value = data.bio;
            if (data.avatarUrl)   document.getElementById('avatarUrl').value = data.avatarUrl;
        });

    document.getElementById('saveBtn').addEventListener('click', () => {
        const payload = {
            displayName: document.getElementById('displayName').value.trim() || null,
            bio:         document.getElementById('bio').value.trim() || null,
            avatarUrl:   document.getElementById('avatarUrl').value.trim() || null
        };

        const statusMsg = document.getElementById('statusMsg');
        const saveBtn   = document.getElementById('saveBtn');
        saveBtn.disabled = true;

        fetch('/api/profiles/me', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(payload)
        })
            .then(r => r.json().then(data => ({ ok: r.ok, data })))
            .then(({ ok, data }) => {
                statusMsg.style.display = 'block';
                if (ok) {
                    statusMsg.className = 'alert alert-success';
                    statusMsg.textContent = 'Profile updated successfully!';
                } else {
                    statusMsg.className = 'alert alert-danger';
                    statusMsg.textContent = data.message || 'Failed to update profile.';
                }
            })
            .catch(() => {
                statusMsg.style.display = 'block';
                statusMsg.className = 'alert alert-danger';
                statusMsg.textContent = 'Network error. Please try again.';
            })
            .finally(() => { saveBtn.disabled = false; });
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        fetch('/api/auth/logout', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
        }).finally(() => {
            localStorage.removeItem('bb_token');
            sessionStorage.removeItem('bb_token');
            window.location.href = '/login';
        });
    });
</script>
</body>
</html>
