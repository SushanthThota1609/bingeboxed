<!-- src/main/resources/templates/profiles/edit.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Edit Profile – BingeBoxed')}">
</head>
<body>

<div th:replace="~{layout/base :: nav('profile')}"></div>

<style>
    .card { background-color:var(--bg-card); border:1px solid var(--border); }
    .form-control, .form-control:focus {
        background-color:#12122a; color:var(--text-main);
        border-color:var(--border); font-family:'DM Sans',sans-serif;
    }
    .form-control:focus { border-color:var(--purple); box-shadow:0 0 0 0.2rem rgba(108,99,255,.25); }
    .btn-primary { background-color:var(--purple); border-color:var(--purple); }
    .btn-primary:hover { background-color:#574fd6; border-color:#574fd6; }
    .btn-outline-secondary { border-color:var(--border); color:var(--text-muted); }
    .btn-outline-secondary:hover { background:#12122a; border-color:var(--text-muted); color:var(--text-main); }
    label { color:var(--text-muted); }
    #statusMsg { display:none; }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg rounded-4 p-4">
                <h2 class="mb-4" style="color:var(--purple)">Edit Profile</h2>
                <div id="statusMsg" class="alert" role="alert"></div>
                <div class="mb-3">
                    <label for="displayName" class="form-label">Display Name</label>
                    <input type="text" class="form-control" id="displayName" maxlength="100" placeholder="Your display name">
                </div>
                <div class="mb-3">
                    <label for="bio" class="form-label">Bio</label>
                    <textarea class="form-control" id="bio" rows="4" placeholder="Tell the world about your taste in shows…"></textarea>
                </div>
                <div class="mb-4">
                    <label for="avatarUrl" class="form-label">Avatar URL</label>
                    <input type="url" class="form-control" id="avatarUrl" maxlength="500" placeholder="https://example.com/avatar.png">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" id="saveBtn">Save Changes</button>
                    <a href="/profile" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>

<script>
    (function () {
        const token = localStorage.getItem('bb_token') || sessionStorage.getItem('bb_token');
        if (!token) { window.location.href = '/login'; return; }

        function authHeaders(json) {
            const h = { 'Authorization': 'Bearer ' + token };
            if (json) h['Content-Type'] = 'application/json';
            return h;
        }

        fetch('/api/profiles/me', { headers: authHeaders(false) })
            .then(r => { if (r.status === 401) { window.location.href = '/login'; return null; } return r.json(); })
            .then(data => {
                if (!data) return;
                if (data.displayName) document.getElementById('displayName').value = data.displayName;
                if (data.bio)         document.getElementById('bio').value         = data.bio;
                if (data.avatarUrl)   document.getElementById('avatarUrl').value   = data.avatarUrl;
            });

        document.getElementById('saveBtn').addEventListener('click', () => {
            const payload = {
                displayName: document.getElementById('displayName').value.trim() || null,
                bio:         document.getElementById('bio').value.trim()         || null,
                avatarUrl:   document.getElementById('avatarUrl').value.trim()   || null
            };
            const statusMsg = document.getElementById('statusMsg');
            const saveBtn   = document.getElementById('saveBtn');
            saveBtn.disabled = true;

            fetch('/api/profiles/me', { method:'PUT', headers:authHeaders(true), body:JSON.stringify(payload) })
                .then(r => r.json().then(data => ({ ok: r.ok, data })))
                .then(({ ok, data }) => {
                    statusMsg.style.display = 'block';
                    statusMsg.className   = ok ? 'alert alert-success' : 'alert alert-danger';
                    statusMsg.textContent = ok ? 'Profile updated successfully!' : (data.message || 'Failed to update profile.');
                })
                .catch(() => {
                    statusMsg.style.display = 'block';
                    statusMsg.className   = 'alert alert-danger';
                    statusMsg.textContent = 'Network error. Please try again.';
                })
                .finally(() => { saveBtn.disabled = false; });
        });
    })();
</script>
</body>
</html>
