// src/main/resources/templates/profiles/public.html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>User Profile | BingeBoxed</title>
</head>
<body>
<section class="container py-4">
    <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Loading profile...</p>
    </div>
    
    <div id="profileContent" style="display: none;">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <div class="display-1 mb-3">👤</div>
                        <h4 id="userDisplayName" class="card-title">Loading...</h4>
                        <p id="userEmail" class="text-muted">Loading...</p>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">About</h5>
                    </div>
                    <div class="card-body">
                        <p id="userBio" class="card-text">No bio yet</p>
                    </div>
                </div>
                
                <!-- Review Stats Section -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="mb-0">Review Stats</h5>
                    </div>
                    <div class="card-body">
                        <div id="statsLoading" class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            <span class="ms-2">Loading stats...</span>
                        </div>
                        <div id="statsContent" style="display: none;">
                            <div class="row text-center">
                                <div class="col-md-6 mb-3">
                                    <h3 id="totalReviews">0</h3>
                                    <p class="text-muted">Total Reviews</p>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <h3 id="avgRating">0.0</h3>
                                    <p class="text-muted">Average Rating</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Recent Reviews Section -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="mb-0">Recent Reviews</h5>
                    </div>
                    <div class="card-body">
                        <div id="reviewsLoading" class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            <p class="mt-2">Loading reviews...</p>
                        </div>
                        <div id="reviewsList"></div>
                        <div id="emptyReviews" class="text-center py-3" style="display: none;">
                            <p class="text-muted">No reviews yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Get user ID from URL path
        const pathParts = window.location.pathname.split('/');
        const userId = pathParts[pathParts.length - 1];
        const token = localStorage.getItem('bb_token') || localStorage.getItem('token');
        
        console.log('Public profile - User ID:', userId);
        
        async function loadPublicProfile() {
            try {
                const response = await fetch(`/api/profiles/public/${userId}`, {
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
                
                if (response.ok) {
                    const profile = await response.json();
                    console.log('Profile data:', profile);
                    
                    document.getElementById('userDisplayName').textContent = profile.displayName || 'User';
                    document.getElementById('userEmail').textContent = profile.email || 'No email';
                    document.getElementById('userBio').textContent = profile.bio || 'No bio yet';
                    
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('profileContent').style.display = 'block';
                    
                    // Load user's reviews
                    loadUserReviews(userId);
                } else {
                    throw new Error('Failed to load profile');
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('loadingState').innerHTML = '<div class="alert alert-danger">User not found</div>';
            }
        }
        
        async function loadUserReviews(userId) {
            try {
                const response = await fetch(`/api/reviews/user/${userId}`);
                
                if (response.ok) {
                    const reviews = await response.json();
                    displayReviews(reviews);
                    
                    // Calculate stats from reviews
                    if (reviews && reviews.length > 0) {
                        const total = reviews.length;
                        const avg = reviews.reduce((sum, r) => sum + r.rating, 0) / total;
                        document.getElementById('totalReviews').textContent = total;
                        document.getElementById('avgRating').textContent = avg.toFixed(1);
                        document.getElementById('statsLoading').style.display = 'none';
                        document.getElementById('statsContent').style.display = 'block';
                    } else {
                        document.getElementById('statsLoading').innerHTML = '<p class="text-muted">No reviews yet</p>';
                    }
                }
            } catch (error) {
                console.error('Error loading user reviews:', error);
                document.getElementById('reviewsLoading').innerHTML = '<p class="text-muted">Unable to load reviews</p>';
            }
        }
        
        function displayReviews(reviews) {
            const container = document.getElementById('reviewsList');
            const loading = document.getElementById('reviewsLoading');
            const emptyReviews = document.getElementById('emptyReviews');
            
            loading.style.display = 'none';
            
            if (!reviews || reviews.length === 0) {
                emptyReviews.style.display = 'block';
                return;
            }
            
            emptyReviews.style.display = 'none';
            
            // Show only last 5 reviews
            const recentReviews = reviews.slice(0, 5);
            
            container.innerHTML = recentReviews.map(review => `
                <div class="border-bottom pb-3 mb-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <a href="/catalog/${review.tmdbId}?type=${review.contentType === 'MOVIE' ? 'movie' : 'series'}" class="fw-bold text-decoration-none">
                                ${escapeHtml(review.content?.title || 'Unknown Title')}
                            </a>
                            <span class="badge ${review.contentType === 'MOVIE' ? 'bg-primary' : 'bg-success'} ms-2">${review.contentType}</span>
                            <div class="text-warning mt-1">
                                ${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}
                                <span class="text-muted ms-2 small">${review.rating}/5</span>
                            </div>
                            ${review.reviewText ? `<p class="text-muted small mt-2 mb-1">${escapeHtml(review.reviewText.substring(0, 200))}${review.reviewText.length > 200 ? '...' : ''}</p>` : ''}
                            <small class="text-muted">${new Date(review.createdAt).toLocaleDateString()}</small>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadPublicProfile();
    </script>
</section>
</body>
</html>
