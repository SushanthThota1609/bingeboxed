<!-- src/main/resources/templates/profiles/view.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('My Profile – BingeBoxed')}">
</head>
<body>

<div th:replace="~{layout/base :: nav('profile')}"></div>

<style>
    .card { background-color: var(--bg-card); border: 1px solid var(--border); }
    .avatar-circle { width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--purple); }
    .avatar-placeholder {
        width:100px; height:100px; border-radius:50%; background-color:#1a1f2e;
        display:flex; align-items:center; justify-content:center;
        font-size:2.5rem; color:var(--purple); border:3px solid var(--purple);
    }
    .btn-primary { background-color:var(--purple); border-color:var(--purple); }
    .btn-primary:hover { background-color:#574fd6; border-color:#574fd6; }
    .muted-text { color:var(--text-muted); font-style:italic; }
    hr { border-color:var(--border); }
    .stat-card { background:#0f1118; border:1px solid var(--border); border-radius:10px; padding:0.75rem 1rem; text-align:center; }
    .stat-card .stat-value { font-size:1.5rem; font-weight:700; color:var(--amber); }
    .stat-card .stat-label { font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg rounded-4 p-4">

                <div class="d-flex align-items-center mb-4 gap-4">
                    <div id="avatarContainer"><div class="avatar-placeholder">🎬</div></div>
                    <div>
                        <h2 id="displayName" class="mb-1 muted-text">No display name set</h2>
                        <small class="text-secondary" id="emailLabel"></small>
                    </div>
                </div>

                <hr>

                <div class="mb-4">
                    <h6 class="text-uppercase text-secondary mb-2" style="font-size:0.75rem;letter-spacing:0.08em">Bio</h6>
                    <p id="bio" class="muted-text">No bio yet.</p>
                </div>

                <div class="d-flex gap-2 mb-4">
                    <a href="/profile/edit" class="btn btn-primary">Edit Profile</a>
                    <a href="/watchlist" class="btn btn-outline-secondary"
                       style="border-color:var(--border);color:var(--text-muted)">My Watchlist</a>
                </div>

                <hr>

                <div id="watchlistStats" style="display:none">
                    <h6 class="text-uppercase text-secondary mb-3" style="font-size:0.75rem;letter-spacing:0.08em">Watchlist</h6>
                    <div class="row g-2 mb-2">
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" style="color:#3b82f6" id="statWantToWatch">0</div><div class="stat-label">Want to Watch</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" style="color:#eab308" id="statWatching">0</div><div class="stat-label">Watching</div></div></div>
                    </div>
                    <div class="row g-2">
                        <div class="col-4"><div class="stat-card"><div class="stat-value" style="color:#22c55e" id="statCompleted">0</div><div class="stat-label">Completed</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="statMovies">0</div><div class="stat-label">Movies</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="statSeries">0</div><div class="stat-label">Series</div></div></div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>

<script>
    (function () {
        const token = localStorage.getItem('bb_token') || sessionStorage.getItem('bb_token');
        if (!token) { window.location.href = '/login'; return; }

        function authHeaders() { return { 'Authorization': 'Bearer ' + token }; }

        fetch('/api/profiles/me', { headers: authHeaders() })
            .then(r => { if (r.status === 401) { window.location.href = '/login'; return null; } return r.json(); })
            .then(data => {
                if (!data) return;
                const dn = document.getElementById('displayName');
                if (data.displayName) { dn.textContent = data.displayName; dn.classList.remove('muted-text'); }
                const bio = document.getElementById('bio');
                if (data.bio) { bio.textContent = data.bio; bio.classList.remove('muted-text'); }
                if (data.email) document.getElementById('emailLabel').textContent = data.email;
                if (data.avatarUrl) {
                    const container = document.getElementById('avatarContainer');
                    const img = document.createElement('img');
                    img.src = data.avatarUrl; img.alt = 'Avatar'; img.className = 'avatar-circle';
                    container.innerHTML = ''; container.appendChild(img);
                }
            })
            .catch(() => { document.getElementById('displayName').textContent = 'Failed to load profile.'; });

        fetch('/api/watchlist/stats', { headers: authHeaders() })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data) return;
                document.getElementById('statTotal').textContent       = data.total       ?? 0;
                document.getElementById('statWantToWatch').textContent = data.wantToWatch ?? 0;
                document.getElementById('statWatching').textContent    = data.watching    ?? 0;
                document.getElementById('statCompleted').textContent   = data.completed   ?? 0;
                document.getElementById('statMovies').textContent      = data.totalMovies ?? 0;
                document.getElementById('statSeries').textContent      = data.totalSeries ?? 0;
                document.getElementById('watchlistStats').style.display = '';
            })
            .catch(() => {});
    })();
</script>
</body>
</html>
