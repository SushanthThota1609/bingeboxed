<!-- src/main/resources/templates/profiles/view.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('My Profile – BingeBoxed')}">
</head>
<body>
<div th:replace="~{layout/base :: nav('profile')}"></div>
<style>
    .card { background-color: var(--bg-card); border: 1px solid var(--border); }
    .avatar-circle { width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--purple); }
    .avatar-placeholder {
        width:100px; height:100px; border-radius:50%; background-color:#1a1f2e;
        display:flex; align-items:center; justify-content:center;
        font-size:2.5rem; color:var(--purple); border:3px solid var(--purple);
    }
    .btn-primary { background-color:var(--purple); border-color:var(--purple); }
    .btn-primary:hover { background-color:#574fd6; border-color:#574fd6; }
    .muted-text { color:var(--text-muted); font-style:italic; }
    hr { border-color:var(--border); }
    .stat-card { background:#0f1118; border:1px solid var(--border); border-radius:10px; padding:0.75rem 1rem; text-align:center; }
    .stat-card .stat-value { font-size:1.5rem; font-weight:700; color:var(--amber); }
    .stat-card .stat-label { font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
    .friend-count-badge { font-size:0.85rem; color:var(--text-muted); margin-top:0.25rem; }
    .friend-count-badge span { color:var(--amber); font-weight:600; }
</style>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg rounded-4 p-4">
                <div class="d-flex align-items-center mb-4 gap-4">
                    <div id="avatarContainer"><div class="avatar-placeholder">🎬</div></div>
                    <div>
                        <h2 id="displayName" class="mb-1 muted-text">No display name set</h2>
                        <small class="text-secondary" id="emailLabel"></small>
                        <div class="friend-count-badge" id="friendCountBadge" style="display:none">
                            <span id="friendsCount">0</span> friends
                        </div>
                    </div>
                </div>
                <hr>
                <div class="mb-4">
                    <h6 class="text-uppercase text-secondary mb-2" style="font-size:0.75rem;letter-spacing:0.08em">Bio</h6>
                    <p id="bio" class="muted-text">No bio yet.</p>
                </div>
                <!-- Self-profile actions -->
                <div id="selfActions" class="d-flex gap-2 mb-4" style="display:none">
                    <a href="/profile/edit" class="btn btn-primary">Edit Profile</a>
                    <a href="/watchlist" class="btn btn-outline-secondary"
                       style="border-color:var(--border);color:var(--text-muted)">My Watchlist</a>
                    <a href="/reviews" class="btn btn-outline-secondary"
                       style="border-color:var(--border);color:var(--text-muted)">My Reviews</a>
                </div>
                <!-- Social actions (other user's profile) -->
                <div id="socialActions" class="d-flex gap-2 mb-4" style="display:none !important">
                    <button id="btnAddFriend"      class="btn btn-primary"           style="display:none">Add Friend</button>
                    <button id="btnRequestSent"    class="btn btn-secondary"         style="display:none" disabled>Request Sent</button>
                    <button id="btnAccept"         class="btn btn-success"           style="display:none">Accept</button>
                    <button id="btnDecline"        class="btn btn-outline-danger"    style="display:none">Decline</button>
                    <button id="btnAlreadyFriends" class="btn btn-outline-secondary" style="display:none" disabled>Friends ✓</button>
                    <a id="btnViewWatchlist" href="#" class="btn btn-outline-secondary"
                       style="border-color:var(--border);color:var(--text-muted)">View Watchlist</a>
                </div>
                <hr>
                <div id="watchlistStats" style="display:none">
                    <h6 class="text-uppercase text-secondary mb-3" style="font-size:0.75rem;letter-spacing:0.08em">Watchlist</h6>
                    <div class="row g-2 mb-2">
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" style="color:#3b82f6" id="statWantToWatch">0</div><div class="stat-label">Want to Watch</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" style="color:#eab308" id="statWatching">0</div><div class="stat-label">Watching</div></div></div>
                    </div>
                    <div class="row g-2">
                        <div class="col-4"><div class="stat-card"><div class="stat-value" style="color:#22c55e" id="statCompleted">0</div><div class="stat-label">Completed</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="statMovies">0</div><div class="stat-label">Movies</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="statSeries">0</div><div class="stat-label">Series</div></div></div>
                    </div>
                </div>
                <!-- Review stats section -->
                <div id="reviewStatsSection" style="display:none">
                    <hr>
                    <h6 class="text-uppercase text-secondary mb-3" style="font-size:0.75rem;letter-spacing:0.08em">
                        Reviews · <a href="/reviews" style="color:var(--amber);text-decoration:none;font-size:0.75rem">View all</a>
                    </h6>
                    <div class="row g-2">
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="rStatTotal">0</div><div class="stat-label">Reviews</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" id="rStatAvg">0.0</div><div class="stat-label">Avg ★</div></div></div>
                        <div class="col-4"><div class="stat-card"><div class="stat-value" style="color:#22c55e" id="rStatFive">0</div><div class="stat-label">5-Star</div></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{layout/base :: scripts}"></div>
<script>
(function () {
    const token = localStorage.getItem('bb_token') || sessionStorage.getItem('bb_token');
    if (!token) { window.location.href = '/login'; return; }
    function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
    const params = new URLSearchParams(window.location.search);
    const viewingUserId = params.get('userId');
    if (viewingUserId) {
        document.getElementById('selfActions').style.display = 'none';
        const socialActions = document.getElementById('socialActions');
        socialActions.style.setProperty('display', 'flex', 'important');
        document.getElementById('btnViewWatchlist').href = '/watchlist/user/' + viewingUserId;
        fetch('/api/users/' + viewingUserId + '/profile', { headers: authHeaders() })
            .then(r => { if (r.status === 401) { window.location.href = '/login'; return null; } return r.ok ? r.json() : null; })
            .then(data => {
                if (!data) return;
                const dn = document.getElementById('displayName');
                if (data.displayName) { dn.textContent = data.displayName; dn.classList.remove('muted-text'); }
                if (data.email) document.getElementById('emailLabel').textContent = data.email;
                renderFriendshipStatus(data.friendshipStatus, viewingUserId);
            })
            .catch(() => {});
        fetch('/api/social/counts/' + viewingUserId)
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data) return;
                document.getElementById('friendsCount').textContent = data.friendsCount ?? 0;
                document.getElementById('friendCountBadge').style.display = '';
            })
            .catch(() => {});
        function renderFriendshipStatus(status, uid) {
            const btnAdd     = document.getElementById('btnAddFriend');
            const btnSent    = document.getElementById('btnRequestSent');
            const btnAccept  = document.getElementById('btnAccept');
            const btnDecline = document.getElementById('btnDecline');
            const btnFriends = document.getElementById('btnAlreadyFriends');
            [btnAdd, btnSent, btnAccept, btnDecline, btnFriends].forEach(b => b.style.display = 'none');
            if (status === 'NONE') {
                btnAdd.style.display = '';
                btnAdd.onclick = () => {
                    fetch('/api/friends/requests', {
                        method: 'POST', headers: authHeaders(),
                        body: JSON.stringify({ receiverId: parseInt(uid) })
                    }).then(r => { if (r.status === 401) { window.location.href = '/login'; return; } renderFriendshipStatus('PENDING_SENT', uid); }).catch(() => {});
                };
            } else if (status === 'PENDING_SENT') {
                btnSent.style.display = '';
            } else if (status === 'PENDING_RECEIVED') {
                btnAccept.style.display = ''; btnDecline.style.display = '';
                fetch('/api/friends/requests/incoming', { headers: authHeaders() })
                    .then(r => r.ok ? r.json() : [])
                    .then(requests => {
                        const req = requests.find(r => String(r.senderId) === String(uid));
                        if (!req) return;
                        btnAccept.onclick = () => {
                            fetch('/api/friends/requests/' + req.id + '/accept', { method: 'POST', headers: authHeaders() })
                                .then(r => { if (r.ok) renderFriendshipStatus('FRIENDS', uid); }).catch(() => {});
                        };
                        btnDecline.onclick = () => {
                            fetch('/api/friends/requests/' + req.id + '/decline', { method: 'POST', headers: authHeaders() })
                                .then(r => { if (r.ok) renderFriendshipStatus('NONE', uid); }).catch(() => {});
                        };
                    }).catch(() => {});
            } else if (status === 'FRIENDS') {
                btnFriends.style.display = '';
            }
        }
    } else {
        document.getElementById('selfActions').style.display = 'flex';
        fetch('/api/profiles/me', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => { if (r.status === 401) { window.location.href = '/login'; return null; } return r.json(); })
            .then(data => {
                if (!data) return;
                const dn = document.getElementById('displayName');
                if (data.displayName) { dn.textContent = data.displayName; dn.classList.remove('muted-text'); }
                const bio = document.getElementById('bio');
                if (data.bio) { bio.textContent = data.bio; bio.classList.remove('muted-text'); }
                if (data.email) document.getElementById('emailLabel').textContent = data.email;
                if (data.avatarUrl) {
                    const container = document.getElementById('avatarContainer');
                    const img = document.createElement('img');
                    img.src = data.avatarUrl; img.alt = 'Avatar'; img.className = 'avatar-circle';
                    container.innerHTML = ''; container.appendChild(img);
                }
            })
            .catch(() => { document.getElementById('displayName').textContent = 'Failed to load profile.'; });
        fetch('/api/watchlist/stats', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data) return;
                document.getElementById('statTotal').textContent       = data.total       ?? 0;
                document.getElementById('statWantToWatch').textContent = data.wantToWatch ?? 0;
                document.getElementById('statWatching').textContent    = data.watching    ?? 0;
                document.getElementById('statCompleted').textContent   = data.completed   ?? 0;
                document.getElementById('statMovies').textContent      = data.totalMovies ?? 0;
                document.getElementById('statSeries').textContent      = data.totalSeries ?? 0;
                document.getElementById('watchlistStats').style.display = '';
            })
            .catch(() => {});
        // Review statistics
        fetch('/api/reviews/stats', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data) return;
                document.getElementById('rStatTotal').textContent = data.totalReviews;
                document.getElementById('rStatAvg').textContent   = data.averageRating.toFixed(1);
                document.getElementById('rStatFive').textContent  = data.fiveStarCount;
                document.getElementById('reviewStatsSection').style.display = '';
            })
            .catch(() => {});
    }
})();
</script>
</body>
</html>
