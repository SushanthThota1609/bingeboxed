<!-- src/main/resources/templates/profiles/view.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile – BingeBoxed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:    #0a0c12;
            --bg-card:    #11141e;
            --amber:      #f5a623;
            --text-main:  #e8eaf0;
            --text-muted: #6b7280;
            --border:     #252b3b;
            --purple:     #6c63ff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .bb-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .bb-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            color: var(--text-main);
            text-decoration: none;
        }

        .bb-brand span { color: var(--amber); }

        .bb-nav-links { display: flex; gap: 1.5rem; align-items: center; }

        .bb-nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.15s;
        }

        .bb-nav-links a:hover { color: var(--amber); }
        .bb-nav-links a.active { color: var(--amber); }

        .btn-logout {
            background: transparent;
            border: 1px solid #e05252;
            color: #e05252;
            border-radius: 6px;
            padding: 0.35rem 0.85rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s, color 0.15s;
        }

        .btn-logout:hover { background: #e05252; color: #fff; }

        .card { background-color: var(--bg-card); border: 1px solid var(--border); }

        .avatar-circle {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--purple);
        }

        .avatar-placeholder {
            width: 100px; height: 100px;
            border-radius: 50%;
            background-color: #1a1f2e;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: var(--purple);
            border: 3px solid var(--purple);
        }

        .btn-primary { background-color: var(--purple); border-color: var(--purple); }
        .btn-primary:hover { background-color: #574fd6; border-color: #574fd6; }

        .muted-text { color: var(--text-muted); font-style: italic; }

        hr { border-color: var(--border); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="bb-nav">
    <a href="/catalog" class="bb-brand">Binge<span>Boxed</span></a>
    <div class="bb-nav-links">
        <a href="/catalog">Browse</a>
        <a href="/profile" class="active">Profile</a>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg rounded-4 p-4">

                <div class="d-flex align-items-center mb-4 gap-4">
                    <div id="avatarContainer">
                        <div class="avatar-placeholder">🎬</div>
                    </div>
                    <div>
                        <h2 id="displayName" class="mb-1 muted-text">No display name set</h2>
                        <small class="text-secondary" id="emailLabel"></small>
                    </div>
                </div>

                <hr>

                <div class="mb-4">
                    <h6 class="text-uppercase text-secondary mb-2" style="font-size: 0.75rem; letter-spacing: 0.08em;">Bio</h6>
                    <p id="bio" class="muted-text">No bio yet.</p>
                </div>

                <div class="d-flex gap-2">
                    <a href="/profile/edit" class="btn btn-primary">Edit Profile</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('bb_token') || sessionStorage.getItem('bb_token');
    if (!token) { window.location.href = '/login'; }

    fetch('/api/profiles/me', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
        .then(r => {
            if (r.status === 401) { window.location.href = '/login'; return null; }
            return r.json();
        })
        .then(data => {
            if (!data) return;

            const displayName = document.getElementById('displayName');
            if (data.displayName) {
                displayName.textContent = data.displayName;
                displayName.classList.remove('muted-text');
            }

            const bio = document.getElementById('bio');
            if (data.bio) {
                bio.textContent = data.bio;
                bio.classList.remove('muted-text');
            }

            if (data.email) {
                document.getElementById('emailLabel').textContent = data.email;
            }

            if (data.avatarUrl) {
                const container = document.getElementById('avatarContainer');
                const img = document.createElement('img');
                img.src = data.avatarUrl;
                img.alt = 'Avatar';
                img.className = 'avatar-circle';
                container.innerHTML = '';
                container.appendChild(img);
            }
        })
        .catch(() => {
            document.getElementById('displayName').textContent = 'Failed to load profile.';
        });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        fetch('/api/auth/logout', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
        }).finally(() => {
            localStorage.removeItem('bb_token');
            sessionStorage.removeItem('bb_token');
            window.location.href = '/login';
        });
    });
</script>
</body>
</html>
