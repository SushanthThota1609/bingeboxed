// src/main/resources/templates/profiles/view.html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>My Profile | BingeBoxed</title>
</head>
<body>
<section class="container py-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <div class="display-1 mb-3">👤</div>
                    <h4 id="userEmail" class="card-title">Loading...</h4>
                    <p class="text-muted">Member since <span id="memberSince">-</span></p>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Account Information</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <p id="profileEmail" class="form-control-plaintext">-</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Account Created</label>
                        <p id="profileCreatedAt" class="form-control-plaintext">-</p>
                    </div>
                </div>
            </div>
            
            <!-- Reviews Section -->
            <div class="card mt-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">My Recent Reviews</h5>
                    <a href="/reviews" class="btn btn-sm btn-outline-primary">View All</a>
                </div>
                <div class="card-body">
                    <div id="profileReviewsList">
                        <div class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            <p class="mt-2">Loading your reviews...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('bb_token') || localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login';
        }
        
        async function loadProfile() {
            try {
                const response = await fetch('/api/profile/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                if (response.ok) {
                    const profile = await response.json();
                    document.getElementById('userEmail').textContent = profile.email;
                    document.getElementById('profileEmail').textContent = profile.email;
                    document.getElementById('memberSince').textContent = new Date(profile.createdAt).toLocaleDateString();
                    document.getElementById('profileCreatedAt').textContent = new Date(profile.createdAt).toLocaleDateString();
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }
        
        async function loadProfileReviews() {
            if (!token) return;
            
            try {
                const response = await fetch('/api/reviews/my', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.ok) {
                    const reviews = await response.json();
                    const container = document.getElementById('profileReviewsList');
                    
                    if (!reviews || reviews.length === 0) {
                        container.innerHTML = '<p class="text-muted text-center">No reviews yet. <a href="/catalog">Browse catalog</a> to write your first review!</p>';
                        return;
                    }
                    
                    const recentReviews = reviews.slice(0, 5);
                    
                    container.innerHTML = recentReviews.map(review => `
                        <div class="border-bottom pb-3 mb-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="flex-grow-1">
                                    <a href="/catalog/${review.tmdbId}?type=${review.contentType === 'MOVIE' ? 'movie' : 'series'}" class="fw-bold text-decoration-none h6">
                                        ${escapeHtml(review.content?.title || 'Unknown Title')}
                                    </a>
                                    <span class="badge ${review.contentType === 'MOVIE' ? 'bg-primary' : 'bg-success'} ms-2">${review.contentType}</span>
                                    <div class="text-warning mt-1">
                                        ${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}
                                        <span class="text-muted ms-2 small">${review.rating}/5</span>
                                    </div>
                                    ${review.reviewText ? `<p class="text-muted small mt-2 mb-1">${escapeHtml(review.reviewText.substring(0, 150))}${review.reviewText.length > 150 ? '...' : ''}</p>` : ''}
                                    <small class="text-muted">Reviewed on ${new Date(review.createdAt).toLocaleDateString()}</small>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else if (response.status === 401) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Error loading profile reviews:', error);
                document.getElementById('profileReviewsList').innerHTML = '<p class="text-muted text-center">Unable to load reviews</p>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        loadProfile();
        loadProfileReviews();
    </script>
</section>
</body>
</html>
