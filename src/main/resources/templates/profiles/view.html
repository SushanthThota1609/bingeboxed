<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - BingeBoxed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .avatar-placeholder {
            width: 120px;
            height: 120px;
            background-color: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        .avatar-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
        }
        .stats-card {
            background-color: #f8f9fa;
            border: none;
            transition: transform 0.2s;
        }
        .stats-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/catalog">BingeBoxed</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/catalog">Browse</a></li>
                <li class="nav-item"><a class="nav-link" href="/watchlist">My Watchlist</a></li>
                <li class="nav-item"><a class="nav-link" href="/social">Social</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="/profile">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navLogoutBtn">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-body text-center">
                    <div id="avatarContainer"></div>
                    <h2 id="displayName" class="card-title"></h2>
                    <p id="email" class="text-muted"></p>
                    <div id="bioContainer" class="mt-3"></div>
                    <div id="friendStats" class="mt-2 text-muted small"></div>
                    <div class="mt-4 d-flex justify-content-center gap-2">
                        <a href="/profile/edit" class="btn btn-primary">Edit Profile</a>
                        <a href="/watchlist" class="btn btn-outline-success">My Watchlist</a>
                        <button id="logoutBtn" class="btn btn-outline-danger">Logout</button>
                        <div id="friendRequestButtonContainer" class="d-inline-block"></div>
                    </div>
                </div>
            </div>

            <!-- Watchlist Summary Widget -->
            <div class="card shadow-sm" id="watchlistStatsWidget" style="display: none;">
                <div class="card-header bg-white">
                    <h5 class="mb-0">📺 Watchlist Summary</h5>
                </div>
                <div class="card-body">
                    <div class="row text-center" id="statsContent">
                        <div class="col-md-3 col-6 mb-3">
                            <div class="stats-card card p-2">
                                <h4 id="statTotal">0</h4>
                                <small class="text-muted">Total items</small>
                            </div>
                        </div>
                        <div class="col-md-3 col-6 mb-3">
                            <div class="stats-card card p-2">
                                <h4 id="statWantToWatch">0</h4>
                                <small class="text-muted">Want to watch</small>
                            </div>
                        </div>
                        <div class="col-md-3 col-6 mb-3">
                            <div class="stats-card card p-2">
                                <h4 id="statWatching">0</h4>
                                <small class="text-muted">Watching</small>
                            </div>
                        </div>
                        <div class="col-md-3 col-6 mb-3">
                            <div class="stats-card card p-2">
                                <h4 id="statCompleted">0</h4>
                                <small class="text-muted">Completed</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem('token');
    if (!token) token = sessionStorage.getItem('token');
    if (!token) token = localStorage.getItem('bb_token');
    if (!token) token = sessionStorage.getItem('bb_token');

    console.log('Token found for view page:', token ? 'yes (length: ' + token.length + ')' : 'no');

    if (!token) {
        console.warn('No authentication token found, redirecting to login');
        window.location.href = '/login';
    }

    // Fetch profile data
    fetch('/api/profiles/me', {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    })
        .then(response => {
            console.log('Profile API response status:', response.status);
            if (response.status === 401) {
                localStorage.removeItem('token');
                sessionStorage.removeItem('token');
                localStorage.removeItem('bb_token');
                sessionStorage.removeItem('bb_token');
                window.location.href = '/login';
                return Promise.reject('Unauthorized');
            }
            if (!response.ok) {
                return response.json().then(err => Promise.reject(err));
            }
            return response.json();
        })
        .then(profile => {
            document.getElementById('displayName').textContent = profile.displayName || 'No display name set';
            document.getElementById('email').textContent = profile.email;

            const bioContainer = document.getElementById('bioContainer');
            if (profile.bio) {
                bioContainer.innerHTML = `<p class="card-text">${escapeHtml(profile.bio)}</p>`;
            } else {
                bioContainer.innerHTML = '<p class="text-muted">No bio added yet.</p>';
            }

            const avatarContainer = document.getElementById('avatarContainer');
            if (profile.avatarUrl) {
                avatarContainer.innerHTML = `<img src="${escapeHtml(profile.avatarUrl)}" alt="Avatar" class="avatar-img">`;
            } else {
                avatarContainer.innerHTML = '<div class="avatar-placeholder">👤</div>';
            }
        })
        .catch(error => {
            console.error('Error loading profile:', error);
            const errorMsg = error.error || error.message || 'Failed to load profile.';
            alert(errorMsg);
        });

    // Fetch watchlist stats
    function loadWatchlistStats() {
        fetch('/api/watchlist/stats', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
            .then(response => {
                if (response.status === 401) return;
                if (!response.ok) throw new Error('Stats fetch failed');
                return response.json();
            })
            .then(stats => {
                if (stats && typeof stats.total === 'number') {
                    document.getElementById('statTotal').textContent = stats.total;
                    document.getElementById('statWantToWatch').textContent = stats.wantToWatch;
                    document.getElementById('statWatching').textContent = stats.watching;
                    document.getElementById('statCompleted').textContent = stats.completed;
                    document.getElementById('watchlistStatsWidget').style.display = 'block';
                }
            })
            .catch(err => console.error('Could not load watchlist stats:', err));
    }

    loadWatchlistStats();

    // For own profile, hide friend request button container (it's used only on public profiles)
    document.getElementById('friendRequestButtonContainer').style.display = 'none';

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function clearTokens() {
        localStorage.removeItem('token');
        sessionStorage.removeItem('token');
        localStorage.removeItem('bb_token');
        sessionStorage.removeItem('bb_token');
    }

    function doLogout() {
        fetch('/api/auth/logout', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
        }).finally(function() {
            clearTokens();
            window.location.href = '/login';
        });
    }

    document.getElementById('logoutBtn').addEventListener('click', doLogout);
    document.getElementById('navLogoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        doLogout();
    });
</script>
</body>
</html>
