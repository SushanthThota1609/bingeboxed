<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Browse — BingeBoxed</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        .content-card { cursor: pointer; transition: transform .15s; }
        .content-card:hover { transform: translateY(-4px); box-shadow: 0 6px 18px rgba(0,0,0,.2); }
        .content-card img { height: 300px; object-fit: cover; }
        #loadingSpinner { display: none; }
    </style>
</head>

<body>
<section layout:fragment="content">

    <div class="container py-4">
        <h1 class="mb-4">Browse Catalog</h1>

        <!-- Search & Filter Bar -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="searchQuery" class="form-label fw-semibold">Search</label>
                        <input type="text" id="searchQuery" class="form-control"
                               placeholder="Title, keyword…"
                               onkeydown="if(event.key==='Enter') handleSearch()">
                    </div>
                    <div class="col-md-2">
                        <label for="typeSelect" class="form-label fw-semibold">Type</label>
                        <select id="typeSelect" class="form-select" onchange="loadGenres()">
                            <option value="movie">Movies</option>
                            <option value="series">Series</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="genreSelect" class="form-label fw-semibold">Genre</label>
                        <select id="genreSelect" class="form-select">
                            <option value="">All Genres</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <label for="yearInput" class="form-label fw-semibold">Year</label>
                        <input type="number" id="yearInput" class="form-control"
                               placeholder="e.g. 2023" min="1888">
                    </div>
                    <div class="col-md-2 d-flex gap-2">
                        <button class="btn btn-primary flex-fill" onclick="handleSearch()">Search</button>
                        <button class="btn btn-outline-secondary flex-fill" onclick="handleBrowse()">Filter</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status / Error -->
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <!-- Loading -->
        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading…</span>
            </div>
        </div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3"></div>

        <!-- Pagination -->
        <nav id="paginationNav" class="mt-4 d-none" aria-label="Results pagination">
            <ul class="pagination justify-content-center" id="paginationList"></ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqvfGMM/Sq7wjPT5f71hx5j6lX"
            crossorigin="anonymous"></script>

    <script>
        let currentPage = 1;
        let currentMode = 'trending'; // 'trending' | 'search' | 'browse'
        let lastQuery = '';
        let lastGenre = '';
        let lastYear = '';

        // -----------------------------------------------------------------------
        // Auth helper — reads JWT stored by the auth flow
        // -----------------------------------------------------------------------
        function authHeaders() {
            const token = localStorage.getItem('authToken');
            return token ? { 'Authorization': 'Bearer ' + token } : {};
        }

        // -----------------------------------------------------------------------
        // API calls
        // -----------------------------------------------------------------------
        async function apiGet(url) {
            const res = await fetch(url, { headers: authHeaders() });
            if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                throw new Error(body.message || ('HTTP ' + res.status));
            }
            return res.json();
        }

        async function loadGenres() {
            const type = document.getElementById('typeSelect').value;
            const sel = document.getElementById('genreSelect');
            sel.innerHTML = '<option value="">All Genres</option>';
            try {
                const genres = await apiGet('/api/catalog/genres?type=' + type);
                genres.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    sel.appendChild(opt);
                });
            } catch (e) {
                console.warn('Could not load genres:', e.message);
            }
        }

        async function loadTrending() {
            const type = document.getElementById('typeSelect').value;
            currentMode = 'trending';
            showSpinner(true);
            clearAlert();
            try {
                const items = await apiGet('/api/catalog/trending?type=' + type + '&window=week');
                renderCards(items);
                hidePagination();
            } catch (e) {
                showAlert('Could not load trending content: ' + e.message, 'danger');
                clearGrid();
            } finally {
                showSpinner(false);
            }
        }

        async function handleSearch() {
            const q = document.getElementById('searchQuery').value.trim();
            if (!q) { showAlert('Please enter a search term.', 'warning'); return; }
            lastQuery = q;
            currentMode = 'search';
            currentPage = 1;
            await doSearch();
        }

        async function doSearch() {
            const type = document.getElementById('typeSelect').value;
            showSpinner(true);
            clearAlert();
            try {
                const data = await apiGet(
                    `/api/catalog/search?q=${encodeURIComponent(lastQuery)}&type=${type}&page=${currentPage}`
                );
                renderCards(data.content || []);
                renderPagination(data.page, data.totalPages, doSearch);
            } catch (e) {
                showAlert('Search failed: ' + e.message, 'danger');
                clearGrid();
            } finally {
                showSpinner(false);
            }
        }

        async function handleBrowse() {
            lastGenre = document.getElementById('genreSelect').value;
            lastYear  = document.getElementById('yearInput').value.trim();
            currentMode = 'browse';
            currentPage = 1;
            await doBrowse();
        }

        async function doBrowse() {
            const type = document.getElementById('typeSelect').value;
            let url = `/api/catalog/browse?type=${type}&page=${currentPage}`;
            if (lastGenre) url += '&genre=' + encodeURIComponent(lastGenre);
            if (lastYear)  url += '&year='  + encodeURIComponent(lastYear);
            showSpinner(true);
            clearAlert();
            try {
                const data = await apiGet(url);
                renderCards(data.content || []);
                renderPagination(data.page, data.totalPages, doBrowse);
            } catch (e) {
                showAlert('Browse failed: ' + e.message, 'danger');
                clearGrid();
            } finally {
                showSpinner(false);
            }
        }

        // -----------------------------------------------------------------------
        // Rendering helpers
        // -----------------------------------------------------------------------
        function renderCards(items) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            if (!items.length) {
                grid.innerHTML = '<p class="text-muted">No results found.</p>';
                return;
            }
            const type = document.getElementById('typeSelect').value;
            items.forEach(item => {
                const poster = item.posterUrl
                    ? item.posterUrl
                    : 'https://via.placeholder.com/200x300?text=No+Image';
                const year  = item.releaseYear || '';
                const genre = item.genre || '';
                const col   = document.createElement('div');
                col.className = 'col';
                col.innerHTML = `
                    <div class="card content-card h-100"
                         onclick="window.location='/catalog/${item.tmdbId}?type=${type}'">
                        <img src="${escHtml(poster)}" class="card-img-top" alt="${escHtml(item.title)}">
                        <div class="card-body p-2">
                            <h6 class="card-title mb-1 text-truncate" title="${escHtml(item.title)}">${escHtml(item.title)}</h6>
                            <small class="text-muted">${escHtml(String(year))}${genre ? ' · ' + escHtml(genre.split(',')[0]) : ''}</small>
                        </div>
                    </div>`;
                grid.appendChild(col);
            });
        }

        function renderPagination(page, totalPages, loadFn) {
            const nav  = document.getElementById('paginationNav');
            const list = document.getElementById('paginationList');
            if (totalPages <= 1) { nav.classList.add('d-none'); return; }
            nav.classList.remove('d-none');
            list.innerHTML = '';

            const addItem = (label, targetPage, disabled, active) => {
                const li = document.createElement('li');
                li.className = 'page-item' + (disabled ? ' disabled' : '') + (active ? ' active' : '');
                li.innerHTML = `<button class="page-link">${label}</button>`;
                if (!disabled && !active) {
                    li.querySelector('button').addEventListener('click', () => {
                        currentPage = targetPage;
                        loadFn();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                }
                list.appendChild(li);
            };

            addItem('«', page - 1, page === 1);
            const start = Math.max(1, page - 2);
            const end   = Math.min(totalPages, page + 2);
            for (let p = start; p <= end; p++) addItem(p, p, false, p === page);
            addItem('»', page + 1, page === totalPages);
        }

        function hidePagination() {
            document.getElementById('paginationNav').classList.add('d-none');
        }

        function clearGrid() {
            document.getElementById('resultsGrid').innerHTML = '';
        }

        function showSpinner(on) {
            document.getElementById('loadingSpinner').style.display = on ? 'block' : 'none';
            if (on) clearGrid();
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
        }

        function clearAlert() {
            const box = document.getElementById('alertBox');
            box.className = 'alert d-none';
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // -----------------------------------------------------------------------
        // Init
        // -----------------------------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            loadGenres();
            loadTrending();
        });
    </script>

</section>
</body>
</html>
