<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Browse Catalog | BingeBoxed</title>
</head>
<body>
<section>
    <div class="container mt-4">
        <h2>Browse Catalog</h2>
        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Search movies or series...">
            </div>
            <div class="col-md-3">
                <select id="typeFilter" class="form-select">
                    <option value="movie">Movies</option>
                    <option value="series">Series</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="genreFilter" class="form-select"></select>
            </div>
        </div>
        <div id="resultsGrid" class="row row-cols-1 row-cols-md-4 g-4"></div>
        <nav aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>

    <script>
        let currentPage = 1;
        let currentQuery = '';
        let currentType = 'movie';
        let currentGenre = '';

        async function loadGenres() {
            const type = document.getElementById('typeFilter').value;
            const response = await fetch(`/api/catalog/genres?type=${type}`, {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('bb_token') }
            });
            const genres = await response.json();
            const genreSelect = document.getElementById('genreFilter');
            genreSelect.innerHTML = '<option value="">All Genres</option>';
            genres.forEach(genre => {
                const option = document.createElement('option');
                option.value = genre.id;
                option.textContent = genre.name;
                genreSelect.appendChild(option);
            });
        }

        async function loadContent() {
            let url = `/api/catalog/browse?type=${currentType}&page=${currentPage}`;
            if (currentGenre) url += `&genre=${currentGenre}`;
            if (currentQuery) {
                url = `/api/catalog/search?q=${encodeURIComponent(currentQuery)}&type=${currentType}&page=${currentPage}`;
            }
            const response = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('bb_token') }
            });
            const data = await response.json();
            renderResults(data.content);
            renderPagination(data.page, data.totalPages);
        }

        function renderResults(items) {
            const grid = document.getElementById('resultsGrid');
            if (!items.length) {
                grid.innerHTML = '<div class="col-12 text-center">No results found</div>';
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="col">
                    <div class="card h-100">
                        <img src="${item.posterUrl || 'https://via.placeholder.com/300x450?text=No+Poster'}" class="card-img-top" alt="${item.title}">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(item.title)}</h5>
                            <p class="card-text">${item.releaseYear || 'N/A'} | ${item.genre || 'Unknown'}</p>
                            <a href="/catalog/${item.tmdbId}?type=${item.type.toLowerCase()}" class="btn btn-primary btn-sm">Details</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderPagination(page, totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            let html = '';
            if (page > 1) {
                html += `<li class="page-item"><a class="page-link" href="#" data-page="${page-1}">Previous</a></li>`;
            }
            for (let i = Math.max(1, page-2); i <= Math.min(totalPages, page+2); i++) {
                html += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
            }
            if (page < totalPages) {
                html += `<li class="page-item"><a class="page-link" href="#" data-page="${page+1}">Next</a></li>`;
            }
            pagination.innerHTML = html;
            document.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    currentPage = parseInt(link.dataset.page);
                    loadContent();
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentQuery = e.target.value;
            currentPage = 1;
            loadContent();
        });
        document.getElementById('typeFilter').addEventListener('change', () => {
            currentType = document.getElementById('typeFilter').value;
            currentGenre = '';
            currentPage = 1;
            loadGenres();
            loadContent();
        });
        document.getElementById('genreFilter').addEventListener('change', (e) => {
            currentGenre = e.target.value;
            currentPage = 1;
            loadContent();
        });

        loadGenres();
        loadContent();
    </script>
</section>
</body>
</html>
