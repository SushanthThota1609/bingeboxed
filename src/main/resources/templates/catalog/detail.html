<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title th:text="${content.title} + ' — BingeBoxed'">Detail — BingeBoxed</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        .poster-img { max-width: 320px; width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.3); }
        .badge-type { font-size: .75rem; }
    </style>
</head>

<body>
<section layout:fragment="content">

    <div class="container py-5">

        <!-- Back link -->
        <a href="/catalog" class="btn btn-sm btn-outline-secondary mb-4">← Back to Browse</a>

        <div class="row g-5">

            <!-- Poster -->
            <div class="col-md-4 text-center text-md-start">
                <img th:if="${content.posterUrl != null}"
                     th:src="${content.posterUrl}"
                     th:alt="${content.title}"
                     class="poster-img">
                <div th:if="${content.posterUrl == null}"
                     class="poster-img bg-secondary d-flex align-items-center justify-content-center text-white"
                     style="height:480px;">
                    <span>No Image</span>
                </div>
            </div>

            <!-- Details -->
            <div class="col-md-8">
                <h1 class="display-6 fw-bold" th:text="${content.title}">Title</h1>

                <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                    <span class="badge bg-primary badge-type"
                          th:text="${content.contentType}">MOVIE</span>
                    <span class="text-muted" th:if="${content.releaseYear != null}"
                          th:text="${content.releaseYear}">2023</span>
                    <span class="text-muted" th:if="${content.genre != null}">
                        <i class="me-1">🎭</i>
                        <span th:text="${content.genre}">Genre</span>
                    </span>
                </div>

                <p class="lead"
                   th:if="${content.overview != null and !#strings.isEmpty(content.overview)}"
                   th:text="${content.overview}">Overview text.</p>
                <p class="text-muted fst-italic"
                   th:if="${content.overview == null or #strings.isEmpty(content.overview)}">
                    No overview available.
                </p>

                <!-- Add to Watchlist — stub until watchlist service is implemented -->
                <button class="btn btn-success btn-lg mt-3" id="watchlistBtn"
                        th:attr="data-tmdb-id=${tmdbId}, data-type=${type}"
                        onclick="addToWatchlist(this)">
                    + Add to Watchlist
                </button>
                <div id="watchlistMsg" class="mt-2 small text-muted"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqvfGMM/Sq7wjPT5f71hx5j6lX"
            crossorigin="anonymous"></script>

    <script>
        function authHeaders() {
            const token = localStorage.getItem('authToken');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            return headers;
        }

        async function addToWatchlist(btn) {
            const tmdbId = btn.dataset.tmdbId;
            const type   = btn.dataset.type;
            const msg    = document.getElementById('watchlistMsg');
            btn.disabled = true;
            try {
                const res = await fetch('/api/watchlist', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ tmdbId: parseInt(tmdbId), type })
                });
                if (res.ok) {
                    btn.textContent = '✓ Added';
                    btn.classList.replace('btn-success', 'btn-secondary');
                    msg.textContent = 'Saved to your watchlist.';
                } else {
                    btn.disabled = false;
                    msg.textContent = 'Could not add to watchlist (coming soon).';
                }
            } catch (e) {
                btn.disabled = false;
                msg.textContent = 'Network error — please try again.';
            }
        }
    </script>

</section>
</body>
</html>
