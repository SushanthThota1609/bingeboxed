<!-- src/main/resources/templates/catalog/detail.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${content.title} + ' — BingeBoxed'">Detail — BingeBoxed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:    #0a0c12;
            --bg-card:    #11141e;
            --amber:      #f5a623;
            --text-main:  #e8eaf0;
            --text-muted: #6b7280;
            --border:     #252b3b;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .bb-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .bb-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            color: var(--text-main);
            text-decoration: none;
        }

        .bb-brand span { color: var(--amber); }

        .bb-nav-links { display: flex; gap: 1.5rem; align-items: center; }

        .bb-nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.15s;
        }

        .bb-nav-links a:hover { color: var(--amber); }

        .btn-logout {
            background: transparent;
            border: 1px solid #e05252;
            color: #e05252;
            border-radius: 6px;
            padding: 0.35rem 0.85rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s, color 0.15s;
        }

        .btn-logout:hover { background: #e05252; color: #fff; }

        .poster-img {
            max-width: 320px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
        }

        .poster-placeholder {
            max-width: 320px;
            width: 100%;
            aspect-ratio: 2/3;
            background: #1a1f2e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .badge-type {
            background: rgba(245,166,35,0.15);
            color: var(--amber);
            border: 1px solid rgba(245,166,35,0.3);
            border-radius: 6px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .btn-back {
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: transparent;
            border-radius: 6px;
            padding: 0.35rem 0.85rem;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.15s, border-color 0.15s;
        }

        .btn-back:hover { color: var(--text-main); border-color: var(--text-muted); }

        .btn-watchlist {
            background: var(--amber);
            border: none;
            border-radius: 8px;
            color: #0a0c12;
            font-weight: 600;
            padding: 0.65rem 1.5rem;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
        }

        .btn-watchlist:hover   { background: #ffb83d; }
        .btn-watchlist:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="bb-nav">
    <a href="/catalog" class="bb-brand">Binge<span>Boxed</span></a>
    <div class="bb-nav-links">
        <a href="/catalog">Browse</a>
        <a href="/profile">Profile</a>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
</nav>

<div class="container py-5">

    <a href="/catalog" class="btn-back mb-4 d-inline-block">← Back to Browse</a>

    <div class="row g-5">

        <!-- Poster -->
        <div class="col-md-4 text-center text-md-start">
            <img th:if="${content.posterUrl != null}"
                 th:src="${content.posterUrl}"
                 th:alt="${content.title}"
                 class="poster-img">
            <div th:if="${content.posterUrl == null}" class="poster-placeholder">🎬</div>
        </div>

        <!-- Details -->
        <div class="col-md-8">
            <h1 class="fw-bold mb-3" th:text="${content.title}">Title</h1>

            <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
                <span class="badge-type" th:text="${content.contentType}">MOVIE</span>
                <span style="color:var(--text-muted)" th:if="${content.releaseYear != null}"
                      th:text="${content.releaseYear}">2024</span>
                <span style="color:var(--text-muted)" th:if="${content.genre != null}">
                    · <span th:text="${content.genre}">Genre</span>
                </span>
            </div>

            <p style="color:var(--text-main);line-height:1.7;font-size:1.05rem"
               th:if="${content.overview != null and !#strings.isEmpty(content.overview)}"
               th:text="${content.overview}">Overview.</p>
            <p style="color:var(--text-muted);font-style:italic"
               th:if="${content.overview == null or #strings.isEmpty(content.overview)}">
                No overview available.
            </p>

            <button class="btn-watchlist mt-4" id="watchlistBtn"
                    th:attr="data-tmdb-id=${tmdbId}, data-type=${type}"
                    onclick="addToWatchlist(this)">
                + Add to Watchlist
            </button>
            <div id="watchlistMsg" class="mt-2" style="font-size:0.85rem;color:var(--text-muted)"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqvfGMM/Sq7wjPT5f71hx5j6lX"
        crossorigin="anonymous"></script>

<script>
    const token = localStorage.getItem('bb_token') || sessionStorage.getItem('bb_token');
    if (!token) { window.location.href = '/login'; }

    function authHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
    }

    async function addToWatchlist(btn) {
        const tmdbId = btn.dataset.tmdbId;
        const type   = btn.dataset.type;
        const msg    = document.getElementById('watchlistMsg');
        btn.disabled = true;
        try {
            const res = await fetch('/api/watchlist', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ tmdbId: parseInt(tmdbId), type })
            });
            if (res.status === 401) { window.location.href = '/login'; return; }
            if (res.ok) {
                btn.textContent = '✓ Added';
                btn.style.background = '#2d6a4f';
                msg.textContent = 'Saved to your watchlist.';
            } else {
                btn.disabled = false;
                msg.textContent = 'Could not add to watchlist (coming soon).';
            }
        } catch {
            btn.disabled = false;
            msg.textContent = 'Network error — please try again.';
        }
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
        fetch('/api/auth/logout', {
            method: 'POST',
            headers: authHeaders()
        }).finally(() => {
            localStorage.removeItem('bb_token');
            sessionStorage.removeItem('bb_token');
            window.location.href = '/login';
        });
    });
</script>
</body>
</html>
